<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> nhập để lấy quà nhooooos </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background-image:url("children-day.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    background:rgba(0,0,0,0.45);
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(5px);
}

h1{
    color:white;
    text-shadow:2px 2px 10px black;
    margin-bottom:20px;
}

input{
    width:280px;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

button{
    margin-top:12px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

#message{
    margin-top:20px;
    color:white;
    font-size:30px;
    font-weight:bold;
    text-shadow:2px 2px 10px black;
}

.firework{
    position:fixed;
    font-size:40px;
    animation:fly 2s linear forwards;
    pointer-events:none;
}

@keyframes fly{
    from{
        transform:translateY(100px);
        opacity:1;
    }
    to{
        transform:translateY(-500px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>🎉 lấy quà nè 🎉</h1>

    <input type="text" id="name" placeholder="Nhập họ-tên">

    <br>

    <button onclick="showWish()">xác nhận</button>

    <div id="message"></div>
</div>

<script>
function showWish(){

    let name = document.getElementById("name").value.trim();

    if(name===""){
        alert("Vui lòng nhập họ tên!");
        return;
    }

    document.getElementById("message").innerHTML =
    "🎈 Chúc <b>"+name+
    "</b> có một ngày Quốc tế Thiếu nhi 1/6 thật vui vẻ, hạnh phúc và ngập tràn tiếng cười! 🎁";

    for(let i=0;i<20;i++){

        let fw=document.createElement("div");

        fw.className="firework";
        fw.innerHTML="🎈";
      fw.innerHTML="🎇";
      fw.innerHTML="💗💗";

        fw.style.left=Math.random()*100+"vw";
        fw.style.top=Math.random()*100+"vh";

        document.body.appendChild(fw);

        setTimeout(()=>{
            fw.remove();
        },2000);
    }
}
</script>

</body>
</html>
